[tool.ruff]
target-version = "py39"
line-length = 120
exclude = [
    "migrations",
    "venv*",
    "node_modules",
    "pode",
    "manage.py",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B905",   # zip strict (py3.10+)
    "UP007",  # use X | Y for union (py3.10+)
    "RUF001", # cyrillic in strings (Russian UI text is intentional)
    "RUF012", # mutable class variable (Django models need this)
]

[tool.ruff.lint.isort]
known-first-party = ["mainapp", "restapp", "swarmown"]

[tool.ruff.format]
quote-style = "double"
